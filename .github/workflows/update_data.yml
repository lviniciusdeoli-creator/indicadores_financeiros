# ─────────────────────────────────────────────────────────────
# GitHub Actions — Atualização Diária de Indicadores Financeiros
#
# Executa todo dia às 08:00 (horário de Brasília / BRT = UTC-3)
# → 08:00 BRT = 11:00 UTC  ──  cron: "0 11 * * *"
#
# O workflow também pode ser disparado manualmente pela aba
# "Actions" do repositório (workflow_dispatch).
#
# Ao final, o arquivo analise_acoes.json é commitado e
# enviado de volta ao repositório automaticamente.
# ─────────────────────────────────────────────────────────────
 
name: 📈 Atualizar Indicadores de Ações
 
on:
  # Agendamento diário — 08:00 BRT (11:00 UTC)
  schedule:
    - cron: "0 11 * * *"
 
  # Permite disparo manual pela interface do GitHub
  workflow_dispatch:
 
jobs:
  atualizar-indicadores:
    name: Coletar e salvar indicadores
    runs-on: ubuntu-latest
 
    # Permissão para escrever no repositório (commit do JSON)
    permissions:
      contents: write
 
    steps:
      # 1. Faz checkout do repositório
      - name: ⬇️ Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Necessário para push posterior
 
      # 2. Configura o Python
      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
 
      # 3. Instala as dependências do projeto
      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests
 
      # 4. Executa o script em modo CI (lê tickers.txt, salva analise_acoes.json)
      - name: 🚀 Executar script de coleta
        run: python script_extracao.py --ci
 
      # 5. Verifica se o JSON foi gerado com sucesso
      - name: ✅ Verificar arquivo gerado
        run: |
          if [ ! -f analise_acoes.json ]; then
            echo "❌ ERRO: analise_acoes.json não foi gerado!"
            exit 1
          fi
          echo "✅ analise_acoes.json gerado com sucesso."
          echo "📏 Tamanho: $(wc -c < analise_acoes.json) bytes"
          echo "📋 Preview (primeiras 30 linhas):"
          head -30 analise_acoes.json
 
      # 6. Commita e envia o JSON atualizado ao repositório
      - name: 💾 Commitar JSON atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
 
          # Adiciona somente o JSON gerado
          git add analise_acoes.json
 
          # Verifica se houve mudança antes de commitar
          if git diff --cached --quiet; then
            echo "ℹ️  Nenhuma alteração detectada no JSON. Commit ignorado."
          else
            DATA=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "📈 Atualização automática de indicadores — ${DATA}"
            git push
            echo "✅ JSON commitado e enviado ao repositório."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
